allprojects {
    group = 'br.edu.ifpb.pubsub'
    version = '1.0.0'

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'groovy'

    dependencies {
        implementation 'org.apache.groovy:groovy-all:5.0.5'
        implementation 'org.apache.groovy:groovy-json:5.0.5'
        // testImplementation 'org.spockframework:spock-core:2.3-groovy-4.0' // Update when Spock for Groovy 5.0 is available
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    sourceSets {
        main {
            groovy {
                srcDirs = ['src/main/groovy']
                exclude 'build.gradle'
                exclude 'bin/**'
                exclude 'build/**'
            }
        }
    }

    compileGroovy {
        groovyOptions.optimizationOptions = [indy: false]
    }
}
